services:
  manticore:
    image: manticoresearch/manticore:dev-25.11.0
    env_file:
      - .env
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    volumes:
      - manticore_data:/var/lib/manticore

  app:
    build: .
    ports:
      - "8000:8000"
    command: >
      sh -c "uvicorn app:app --host 0.0.0.0 --port 8000"

volumes:
  manticore_data:
