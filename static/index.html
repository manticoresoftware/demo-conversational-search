<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FIQA Search</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="shortcut icon" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/styles.css?v=20260512e" />
  </head>
  <body>
    <main id="home-screen" class="home-screen">
      <a class="home-brand" href="/" aria-label="FIQA Search home">
        <span class="brand-blue">F</span><span class="brand-red">I</span><span class="brand-yellow">Q</span><span class="brand-blue">A</span>
      </a>
      <form id="home-form" class="home-search" aria-label="Start search">
        <input id="home-query" type="text" placeholder="Ask about finance comments..." autofocus />
        <div class="home-actions">
          <button id="home-search-btn" type="submit">Search</button>
          <button id="home-ai-btn" type="button">Ask AI</button>
        </div>
      </form>
    </main>

    <main id="results-screen" class="container hidden" hidden>
      <section class="results-panel">
        <div id="error-banner" class="error-banner hidden" role="alert" hidden></div>

        <form id="results-search-form" class="results-search-form hidden" aria-label="Search sources" hidden>
          <input id="results-query" type="text" placeholder="Search sources..." />
          <button id="results-search-btn" type="submit">Search</button>
        </form>

        <section id="ai-overview" class="ai-overview" aria-live="polite">
          <div id="ai-history" class="ai-history"></div>
          <div id="ai-answer" class="ai-answer hidden" hidden>
            <p>Ask a finance question to generate an answer from FIQA comments. Sources will appear below.</p>
          </div>
        </section>

        <form id="followup-form" class="followup-form" aria-label="Ask a follow-up question">
          <input id="followup-input" type="text" placeholder="Ask a follow-up" />
          <button id="followup-send-btn" type="submit" aria-label="Send follow-up">↑</button>
        </form>

        <section class="source-results">
          <h2>Sources</h2>
          <p id="meta"></p>
          <div id="grid" class="grid"></div>
          <div class="pagination">
            <button id="prev-page-btn" type="button">Previous</button>
            <div id="page-buttons" class="page-buttons"></div>
            <p id="page-meta" class="page-meta"></p>
            <button id="next-page-btn" type="button">Next</button>
          </div>
        </section>
      </section>
    </main>

    <div id="product-modal" class="product-modal hidden" hidden>
      <button id="product-modal-backdrop" class="product-modal-backdrop" type="button" aria-label="Close comment details"></button>
      <section class="product-modal-card">
        <div class="product-modal-head">
          <h2 id="product-modal-title">Comment</h2>
          <button id="product-modal-close-btn" class="product-modal-close-btn" type="button" aria-label="Close">×</button>
        </div>
        <div class="product-page">
          <div class="product-page-main">
            <p id="product-modal-brand" class="product-page-brand"></p>
            <p id="product-modal-rating" class="product-page-rating"></p>
            <p id="product-modal-price" class="product-page-price"></p>
            <p id="product-modal-description" class="product-page-description"></p>
          </div>
        </div>
      </section>
    </div>

    <template id="card-template">
      <article class="card feed-card">
        <div class="card-body">
          <h3 class="title"></h3>
          <p class="rating"></p>
          <p class="bought"></p>
          <p class="delivery"></p>
          <p class="description"></p>
          <div class="tags">
            <span class="tag brand"></span>
            <span class="tag color"></span>
          </div>
        </div>

        <details class="dataset-details">
          <summary>Document fields</summary>
          <div class="dataset-grid">
            <p class="id"></p>
            <p class="product-locale"></p>
            <p class="example-id"></p>
            <p class="query-id"></p>
            <p class="query"></p>
            <p class="esci-label"></p>
            <p class="small-version"></p>
            <p class="large-version"></p>
            <p class="split"></p>
            <p class="source"></p>
          </div>
        </details>
      </article>
    </template>

    <script src="/static/app.js?v=20260512e"></script>
  </body>
</html>
